name: Deploy to GitHub Pages

# (V2 Phase 5) Builds the Vite project and publishes ./dist to GitHub Pages on
# every push to main. Set Pages source to "GitHub Actions" (or the gh-pages
# branch this action publishes) in the repository settings once.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
